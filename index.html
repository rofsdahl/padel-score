<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Padel Score</title>
  <meta name="theme-color" content="#000000" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    @media screen and (orientation: portrait) {
      body {
        position: absolute;
        top: 0;
        left: 100%;
        width: 100vh;
        height: 100vw;
        transform: rotate(90deg);
        transform-origin: top left;
      }
    }

    #court {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      justify-items: center;
      width: 100%;
      height: 100%;
      padding: 0 4vw;
    }

    .point {
      font-size: 26vw;
      font-weight: 800;
      line-height: 1;
      text-align: center;
    }

    #center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5vh;
      padding: 0 2vw;
    }

    .sets-row {
      display: flex;
      align-items: center;
      gap: 0.5vw;
      font-size: 3.5vw;
      font-weight: 500;
      color: #888;
    }

    .set-pair {
      display: flex;
      gap: 0.3vw;
    }

    .set-sep {
      color: #333;
      margin: 0 0.8vw;
    }

    .games-row {
      display: flex;
      align-items: center;
      gap: 1vw;
      font-size: 8vw;
      font-weight: 700;
    }

    .game-divider {
      color: #444;
      font-size: 6vw;
    }

    #dot {
      position: fixed;
      bottom: 10px;
      right: 10px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    #winner {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      align-items: center;
      justify-content: center;
      font-size: 10vw;
      font-weight: 800;
      text-align: center;
      flex-direction: column;
      gap: 4vh;
    }
    #winner.show { display: flex; }
    #winner button {
      font-size: 3vw;
      color: #fff;
      background: none;
      border: 2px solid #fff;
      border-radius: 8px;
      padding: 1vh 3vw;
      cursor: pointer;
    }
  </style>
</head>
<body tabindex="0">

<div id="court">
  <div class="point" id="pt-left">0</div>

  <div id="center">
    <div class="sets-row" id="sets-row"></div>
    <div class="games-row">
      <span id="games-left">0</span>
      <span class="game-divider">–</span>
      <span id="games-right">0</span>
    </div>
  </div>

  <div class="point" id="pt-right">0</div>
</div>

<div id="winner">
  <div id="winner-text"></div>
  <button onclick="newMatch()">New Match</button>
</div>

<video id="dot" autoplay playsinline muted loop></video>

<script>
  const POINTS = ['0', '15', '30', '40', 'AD'];
  const SETS_TO_WIN = 3;
  const GAMES_TO_WIN_SET = 3;

  let history = [];
  let state = freshState();

  function freshState() {
    return { pts: [0, 0], games: [0, 0], sets: [], done: false };
  }

  function addPoint(side) {
    if (state.done) return;
    history.push(JSON.parse(JSON.stringify(state)));
    const opp = 1 - side;
    const p = state.pts;

    if (p[side] < 3) {
      p[side]++;
    } else if (p[side] === 3 && p[opp] < 3) {
      winGame(side);
    } else if (p[side] === 3 && p[opp] === 3) {
      p[side] = 4; // AD
    } else if (p[side] === 4) {
      winGame(side);
    } else if (p[opp] === 4) {
      p[opp] = 3; // back to deuce
    }

    render();
  }

  function winGame(side) {
    state.pts = [0, 0];
    state.games[side]++;
    const g = state.games;

    // First to GAMES_TO_WIN_SET with 2 clear wins set
    const opp = 1 - side;
    if (g[side] >= GAMES_TO_WIN_SET && g[side] - g[opp] >= 2) {
      state.sets.push([...g]);
      state.games = [0, 0];
      const setsWon = [0, 1].map(s => state.sets.filter(set => set[s] > set[1-s]).length);
      if (setsWon[side] >= SETS_TO_WIN) state.done = true;
    }
  }

  function undo() {
    if (history.length === 0) return;
    state = history.pop();
    render();
  }

  function render() {
    document.getElementById('pt-left').textContent = POINTS[state.pts[0]];
    document.getElementById('pt-right').textContent = POINTS[state.pts[1]];
    document.getElementById('games-left').textContent = state.games[0];
    document.getElementById('games-right').textContent = state.games[1];

    const setsRow = document.getElementById('sets-row');
    setsRow.innerHTML = state.sets.map((set, i) =>
      (i > 0 ? '<span class="set-sep">|</span>' : '') +
      `<span class="set-pair"><span>${set[0]}</span><span style="color:#333;margin:0 0.2vw">-</span><span>${set[1]}</span></span>`
    ).join('');

    if (state.done) {
      const setsWon = [0, 1].map(s => state.sets.filter(set => set[s] > set[1-s]).length);
      document.getElementById('winner-text').textContent = setsWon[0] >= SETS_TO_WIN ? 'LEFT WINS' : 'RIGHT WINS';
      document.getElementById('winner').classList.add('show');
    } else {
      document.getElementById('winner').classList.remove('show');
    }
  }

  function newMatch() {
    history = [];
    state = freshState();
    render();
  }

  render();

  // ── Button input ───────────────────────────────────────────────
  const WINDOW_MS = 400;
  let pressCount = 0;
  let timer = null;

  document.body.focus();
  window.addEventListener('keydown', e => { if (e.key === ' ') e.preventDefault(); }, { capture: true });
  document.addEventListener('keydown', e => {
    if (e.key !== ' ' || e.repeat) return;
    e.preventDefault();
    pressCount++;
    clearTimeout(timer);
    timer = setTimeout(() => {
      if (pressCount === 1) addPoint(0);
      else if (pressCount === 2) addPoint(1);
      else if (pressCount >= 3) undo();
      pressCount = 0;
    }, WINDOW_MS);
  });

  // ── Wake lock ──────────────────────────────────────────────────
  async function requestWakeLock() {
    try { await navigator.wakeLock.request('screen'); } catch(e) {}
  }
  requestWakeLock();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });

  // ── Canvas → video keepalive ───────────────────────────────────
  const canvas = document.createElement('canvas');
  canvas.width = 40; canvas.height = 40;
  const ctx = canvas.getContext('2d');
  const vid = document.getElementById('dot');
  try { vid.srcObject = canvas.captureStream(30); vid.play().catch(() => {}); } catch(e) {}

  let phase = 0;
  (function draw() {
    phase += 0.015;
    const b = Math.round(((Math.sin(phase) + 1) / 2) * 255);
    ctx.clearRect(0, 0, 40, 40);
    ctx.beginPath();
    ctx.arc(20, 20, 14, 0, Math.PI * 2);
    ctx.fillStyle = `rgb(${b},${b},${b})`;
    ctx.fill();
    requestAnimationFrame(draw);
  })();
</script>

</body>
</html>
