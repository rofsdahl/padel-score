<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Button Tester</title>
  <meta name="theme-color" content="#000000" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
    }

    /* Default: landscape — fill viewport normally */
    body {
      width: 100vw;
      height: 100vh;
    }

    /* Portrait: rotate the whole body 90deg to fake landscape */
    @media screen and (orientation: portrait) {
      body {
        position: absolute;
        top: 0;
        left: 100%;
        width: 100vh;
        height: 100vw;
        transform: rotate(90deg);
        transform-origin: top left;
      }
    }

    h1 {
      font-size: 1rem;
      font-weight: 400;
      color: #fff;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #event-name {
      font-size: 5rem;
      font-weight: 700;
      line-height: 1;
      min-height: 6rem;
    }
    #keepalive {
      position: fixed;
      bottom: 16px;
      right: 16px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
    }
  </style>
</head>
<body tabindex="0">

  <h1>Button Tester - video dot</h1>
  <div id="event-name"></div>
  <video id="keepalive" autoplay playsinline muted loop></video>

<script>
  const WINDOW_MS = 400;
  let pressCount = 0;
  let timer = null;
  const eventName = document.getElementById('event-name');
  const labels = { 1: 'SINGLE', 2: 'DOUBLE', 3: 'TRIPLE' };

  document.body.focus();

  // Keep screen awake — Wake Lock API
  let wakeLock = null;
  async function requestWakeLock() {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
    } catch (e) {}
  }
  requestWakeLock();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });

  // Draw pulsing dot on canvas, stream into <video> so iOS treats it as media playback
  const canvas = document.createElement('canvas');
  canvas.width = 48; canvas.height = 48;
  const ctx = canvas.getContext('2d');
  const video = document.getElementById('keepalive');

  let stream;
  try {
    stream = canvas.captureStream(30);
    video.srcObject = stream;
    video.play().catch(() => {});
  } catch(e) {}

  let phase = 0;
  function drawDot() {
    phase += 0.02;
    const brightness = (Math.sin(phase) + 1) / 2; // 0 to 1
    const gray = Math.round(brightness * 255);
    ctx.clearRect(0, 0, 48, 48);
    ctx.beginPath();
    ctx.arc(24, 24, 16, 0, Math.PI * 2);
    ctx.fillStyle = `rgb(${gray},${gray},${gray})`;
    ctx.fill();
    requestAnimationFrame(drawDot);
  }
  drawDot();

  window.addEventListener('keydown', (e) => {
    if (e.key === ' ') e.preventDefault();
  }, { capture: true });

  document.addEventListener('keydown', (e) => {
    if (e.key !== ' ') return;
    e.preventDefault();
    if (e.repeat) return;

    pressCount++;
    clearTimeout(timer);
    timer = setTimeout(() => {
      eventName.textContent = labels[pressCount] || `×${pressCount}`;
      pressCount = 0;
    }, WINDOW_MS);
  });
</script>

</body>
</html>
