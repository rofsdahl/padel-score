<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Padel Score</title>
  <meta name="theme-color" content="#000000" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: stretch;
      overflow: hidden;
    }

    #side-left, #side-right {
      width: calc(50vw - 30px);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1vh;
      overflow: hidden;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .point {
      font-weight: 800;
      line-height: 1;
      text-align: center;
      width: 100%;
    }

    .dots {
      display: flex;
      gap: 1.2vw;
      align-items: center;
      height: 3vw;
    }

    .dot {
      width: 2.2vw;
      height: 2.2vw;
      border-radius: 50%;
      background: #fff;
    }

    #divider {
      width: 60px;
      flex-shrink: 0;
      flex-grow: 0;
      align-self: stretch;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 2vh 0;
    }

    #keepalive {
      width: 6px;
      flex: 1;
      margin: 1vh 0;
      border-radius: 3px;
    }

    .ctrl {
      font-size: 6vw;
      color: #444;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      padding: 1vh;
    }

    .ctrl:active { color: #fff; }
  </style>
</head>
<body tabindex="0">

<div id="side-left" onclick="addPoint(0)">
  <div class="point" id="pt-left">0</div>
  <div class="dots" id="dots-left"></div>
</div>

<div id="divider">
  <div class="ctrl" onclick="undo()">↩</div>
  <video id="keepalive" autoplay playsinline muted loop></video>
  <div class="ctrl" onclick="reset()">✕</div>
</div>

<div id="side-right" onclick="addPoint(1)">
  <div class="point" id="pt-right">0</div>
  <div class="dots" id="dots-right"></div>
</div>

<script>
  const POINTS = ['0', '15', '30', '40', 'AD'];

  let history = [];
  let state = freshState();

  function freshState() {
    return { pts: [0, 0], games: [0, 0] };
  }

  function addPoint(side) {
    history.push(JSON.parse(JSON.stringify(state)));
    const opp = 1 - side;
    const p = state.pts;

    if (p[side] < 3) {
      p[side]++;
    } else if (p[side] === 3 && p[opp] < 3) {
      winGame(side);
    } else if (p[side] === 3 && p[opp] === 3) {
      p[side] = 4;
    } else if (p[side] === 4) {
      winGame(side);
    } else if (p[opp] === 4) {
      p[opp] = 3;
    }

    render();
  }

  function winGame(side) {
    state.pts = [0, 0];
    state.games[side]++;
  }

  function undo() {
    if (history.length === 0) return;
    state = history.pop();
    render();
  }

  function reset() {
    history = [];
    state = freshState();
    render();
  }

  function makeDots(count) {
    return Array.from({ length: count }, () => '<div class="dot"></div>').join('');
  }

  function render() {
    const ptL = POINTS[state.pts[0]];
    const ptR = POINTS[state.pts[1]];
    document.getElementById('pt-left').textContent = ptL;
    document.getElementById('pt-right').textContent = ptR;

    // Scale font based on character count so text always fits
    [['pt-left', ptL], ['pt-right', ptR]].forEach(([id, txt]) => {
      document.getElementById(id).style.fontSize = txt.length === 1 ? '42vw' : '28vw';
    });

    document.getElementById('dots-left').innerHTML = makeDots(state.games[0]);
    document.getElementById('dots-right').innerHTML = makeDots(state.games[1]);
  }

  render();

  // ── Button input ───────────────────────────────────────────────
  const WINDOW_MS = 400;
  let pressCount = 0;
  let timer = null;

  document.body.focus();
  window.addEventListener('keydown', e => { if (e.key === ' ') e.preventDefault(); }, { capture: true });
  document.addEventListener('keydown', e => {
    if (e.key !== ' ' || e.repeat) return;
    e.preventDefault();
    pressCount++;
    clearTimeout(timer);
    timer = setTimeout(() => {
      if (pressCount === 1) addPoint(0);
      else if (pressCount === 2) addPoint(1);
      else if (pressCount >= 3) undo();
      pressCount = 0;
    }, WINDOW_MS);
  });

  // ── Wake lock ──────────────────────────────────────────────────
  async function requestWakeLock() {
    try { await navigator.wakeLock.request('screen'); } catch(e) {}
  }
  requestWakeLock();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });

  // ── Canvas → video: vertical bar fading white to grey ─────────
  const canvas = document.createElement('canvas');
  canvas.width = 6;
  canvas.height = 300;
  const ctx = canvas.getContext('2d');
  const vid = document.getElementById('keepalive');
  try { vid.srcObject = canvas.captureStream(30); vid.play().catch(() => {}); } catch(e) {}

  let phase = 0;
  (function draw() {
    phase += 0.015;
    const t = (Math.sin(phase) + 1) / 2;
    const hi = Math.round(180 + t * 75);
    const lo = Math.round(40 + t * 40);
    const b = Math.round(80 + t * 175);
    ctx.fillStyle = `rgb(${b},${b},${b})`;
    ctx.fillRect(0, 0, 6, 300);
    requestAnimationFrame(draw);
  })();
</script>

</body>
</html>
